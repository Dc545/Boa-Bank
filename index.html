<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaBank</title>
<style>
  :root {
    --bg: #f0f4f8; --card: white; --text: #1a1a1a; --sub: #64748b;
    --border: #cbd5e1; --primary: #1e40af; --primary-dark: #1e3a8a;
    --badge-bg: #fef3c7; --badge-text: #92400e; --warning: #fefce8;
  }
  [data-theme="dark"] {
    --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --sub: #94a3b8;
    --border: #334155; --primary: #3b82f6; --primary-dark: #2563eb;
    --badge-bg: #422006; --badge-text: #fbbf24; --warning: #451a03;
  }
    * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, sans-serif; }
  body { background:var(--bg); color:var(--text); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; transition:0.3s; }
  .card { background:var(--card); padding:32px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.2); width:100%; max-width:480px; }
  .logo-wrap { display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer; }
  .logo { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--primary),#3b82f6); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:20px; }
  h1 { font-size:26px; margin-bottom:6px; color:var(--text); }
  .subtitle { color:var(--sub); font-size:13px; margin-bottom:24px; }
  input { width:100%; padding:12px; border:1px solid var(--border); border-radius:8px; margin-bottom:12px; font-size:16px; background:var(--bg); color:var(--text); }
  button { width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:16px; }
  button:hover { background:var(--primary-dark); }
  .error { color:#dc2626; font-size:13px; margin-top:8px; display:none; }
  .dashboard { display:none; }
  .banner { background:var(--warning); border:1px solid #fde047; color:#713f12; padding:12px; border-radius:8px; margin-bottom:16px; font-size:13px; font-weight:600; text-align:center; }
  .balance-card { background:linear-gradient(135deg,var(--primary),#3b82f6); color:white; padding:24px; border-radius:12px; margin:20px 0; text-align:center; }
  .balance { font-size:38px; font-weight:700; margin:8px 0; }
  .badge { background:var(--badge-bg); color:var(--badge-text); padding:4px 8px; border-radius:6px; font-size:12px; font-weight:700; display:inline-block; margin-bottom:12px; }
  .logout { background:var(--border); color:var(--text); margin-top:12px; }
  .btn-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:16px 0; }
  .btn-secondary { background:var(--bg); color:var(--primary); border:1px solid var(--border); font-size:14px; padding:10px; }
  .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .theme-btn { width:auto; padding:8px 12px; font-size:13px; }
  .transactions { margin-top:20px; text-align:left; max-height:240px; overflow-y:auto; }
  .tx-title { font-weight:600; margin-bottom:10px; font-size:15px; color:var(--text); display:flex; justify-content:space-between; align-items:center; }
  .tx-item { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .tx-credit { color:#16a34a; font-weight:600; }
  .tx-debit { color:#dc2626; font-weight:600; }
  .tx-date { color:var(--sub); font-size:12px; }
  .footer { font-size:11px; color:var(--sub); margin-top:20px; text-align:center; line-height:1.4; }
  .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
  .modal-content { background:var(--card); padding:24px; border-radius:12px; width:90%; max-width:340px; }
  .filter { margin-bottom:12px; }
  .skeleton { background:var(--border); height:14px; border-radius:4px; animation:pulse 1.5s infinite; margin:4px 0; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
</style>
</head>
<body>

<div class="card" id="loginBox">
  <div class="logo-wrap" onclick="goHome()">
    <div class="logo">N</div>
    <h1>NovaBank</h1>
  </div>
  <p class="subtitle">bank or financial service</p>
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Sign In</button>
  <p class="error" id="err">Wrong username or password</p>
  <p class="footer">NovaBank 
  
</div>

<div class="card dashboard" id="dashBox">  
  <div class="top-bar">
    <div class="logo-wrap" onclick="logout()">
      <div class="logo">N</div>
      <h1>Hi, Jonathan</h1>
    </div>
    <button class="theme-btn" onclick="toggleTheme()">🌙 Dark</button>
  </div>
  
  <span class="badge">ACCOUNT </span>
  
  <div class="balance-card">
    <p style="opacity:0.9; font-size:14px;">Available Balance - Demo</p>
    <div class="balance" id="balance">$1,000,000.00</div>
  </div>

  <div class="btn-row">
    <button class="btn-secondary" onclick="openModal('deposit')">Deposit </button>
    <button class="btn-secondary" onclick="openModal('withdraw')">Withdraw </button>
    <button class="btn-secondary" onclick="openModal('transfer')">Transfer </button>
  </div>

  <div class="transactions">
    <div class="tx-title">
      <span>Recent Transactions - Data</span>
      <input class="filter" id="search" placeholder="Search demo tx..." oninput="renderTransactions()" style="width:140px; margin:0; padding:6px; font-size:12px;">
    </div>
    <div id="txList"></div>
  </div>

  <button class="logout" onclick="logout()">Log Out</button>
  <p class="footer">NovaBank is fictional. All balances, transactions, and actions are simulated</p>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin-bottom:12px;">Demo Action</h3>
    <input type="number" id="amount" placeholder="Enter demo amount" step="0.01">
    <button onclick="confirmAction()" style="margin-top:12px;">Confirm Demo</button>
    <button class="btn-secondary" onclick="closeModal()" style="margin-top:8px;">Cancel</button>
  </div>
</div>

<script>
const DEMO_USER = "Jonathan Goana";
const DEMO_PASS = "goana545";
let balance = 1000000.00;
let transactions = [
  {type:'credit', desc:'Salary Deposit', date:'Jun 05, 2026', amt:50000},
  {type:'debit', desc:'Grocery Store', date:'Jun 04, 2026', amt:120.50},
  {type:'debit', desc:'Watch Purchase - Geneva', date:'Jun 03, 2026', amt:3500},
  {type:'credit', desc:'Freelance Payment', date:'Jun 01, 2026', amt:8000}
];
let currentAction = '';

function login() {
  showSkeleton();
  setTimeout(() => {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    if(u === DEMO_USER && p === DEMO_PASS) {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('dashBox').style.display = 'block';
      renderTransactions();
    } else {
      document.getElementById('err').style.display = 'block';
    }
  }, 800);
}

function showSkeleton() {
  document.getElementById('txList').innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
}

function logout() {
  document.getElementById('dashBox').style.display = 'none';
  document.getElementById('loginBox').style.display = 'block';
  document.getElementById('user').value = '';
  document.getElementById('pass').value = '';
  document.getElementById('err').style.display = 'none';
}

function goHome() {
  if(document.getElementById('dashBox').style.display === 'block') logout();
}

function renderTransactions() {
  const list = document.getElementById('txList');
  const search = document.getElementById('search').value.toLowerCase();
  list.innerHTML = '';
  
  transactions
    .filter(tx => tx.desc.toLowerCase().includes(search))
    .forEach(tx => {
      const div = document.createElement('div');
      div.className = 'tx-item';
      div.innerHTML = `
        <div><div>${tx.desc} - Demo</div><div class="tx-date">${tx.date}</div></div>
        <div class="${tx.type==='credit'?'tx-credit':'tx-debit'}">
          ${tx.type==='credit'?'+':'-'}$${tx.amt.toLocaleString()}
        </div>`;
      list.appendChild(div);
    });
}

function openModal(action) {
  currentAction = action;
  document.getElementById('modalTitle').textContent = `Demo ${action.charAt(0).toUpperCase()+action.slice(1)}`;
  document.getElementById('amount').value = '';
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function confirmAction() {
  const amt = parseFloat(document.getElementById('amount').value);
  if(!amt || amt<=0) { alert('Enter a valid demo amount'); return; }
  
  const today = new Date().toLocaleDateString('en-US', {month:'short', day:'2-digit', year:'numeric'});
  
  if(currentAction==='deposit') {
    balance += amt;
    transactions.unshift({type:'credit', desc:'Demo Deposit', date:today, amt:amt});
  } else if(currentAction==='withdraw') {
    if(amt>balance) { alert('Demo: Insufficient fake funds'); return; }
    balance -= amt;
    transactions.unshift({type:'debit', desc:'Demo Withdrawal', date:today, amt:amt});
  } else {
    alert('Demo: Transfer simulated. No real money moved.');
    transactions.unshift({type:'debit', desc:'Demo Transfer', date:today, amt:amt});
    balance -= amt;
  }
  
  document.getElementById('balance').textContent = '$' + balance.toLocaleString(undefined,{minimumFractionDigits:2});
  renderTransactions();
  closeModal();
}

function toggleTheme() {
  const html = document.documentElement;
  const btn = document.querySelector('.theme-btn');
  if(html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
    btn.textContent = '🌙 Dark';
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️ Light';
  }
}
</script>

</body>
</html>
